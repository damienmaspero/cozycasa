# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - cozycasa

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys to the same App Service slot. azure/webapps-deploy uses
# Kudu OneDeploy, which returns `Conflict (CODE: 409)` if another deployment
# is already in progress on the target slot. Queue runs instead of cancelling
# so an in-flight OneDeploy is allowed to finish cleanly.
concurrency:
  group: deploy-cozycasa-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Assemble standalone deployment artifact
        run: |
          # `output: "standalone"` (next.config.mjs) emits a self-contained
          # server under `.next/standalone` (server.js + a traced, minimal
          # node_modules) that runs with plain `node server.js` — no `next` CLI
          # or `node_modules/.bin` symlink, which is what Azure App Service
          # could not resolve (`sh: 1: next: not found`). Static assets and the
          # public folder are not copied into the standalone output, so add
          # them next to the server.
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          # Point the deployed app's `start` script at the standalone server.
          # Azure's Oryx startup runs `npm start`, and the `startup-command`
          # action input is rejected with publish-profile auth ("startup-command
          # is not a valid input ... with publish-profile auth scheme"), so the
          # start command must live in the deployed package.json instead. Only
          # the standalone copy is changed; the repo's root package.json (used
          # by local `npm start` → `next start`) is left untouched.
          #
          # `HOSTNAME=0.0.0.0` is required: the standalone `server.js` binds to
          # `process.env.HOSTNAME || '0.0.0.0'`, and Azure App Service sets
          # HOSTNAME to the container instance name (e.g. `ln0xsdlwk0007J7`).
          # Without the override the server tries to bind that name and crashes
          # with `getaddrinfo ENOTFOUND <instance>`, so it never answers the
          # port-8080 health probe and the container fails to start.
          node -e "const fs=require('fs');const p='.next/standalone/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.scripts={...j.scripts,start:'HOSTNAME=0.0.0.0 node server.js'};fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cozycasa'
          slot-name: 'Production'
          # Deploy only the self-contained standalone output. Its contents land
          # at the wwwroot root, so the SQLite `./data` path (relative to the
          # server's working directory) stays the same as before.
          package: .next/standalone
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2214993838554F44934AE77B7DF3FC5D }}
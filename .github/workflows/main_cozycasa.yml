# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - cozycasa

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys to the same App Service slot. azure/webapps-deploy uses
# Kudu OneDeploy, which returns `Conflict (CODE: 409)` if another deployment
# is already in progress on the target slot. Queue runs instead of cancelling
# so an in-flight OneDeploy is allowed to finish cleanly.
concurrency:
  group: deploy-cozycasa-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      # Cache Playwright's browser download (~161 MiB Chromium) keyed on the
      # locked Playwright version so we only re-download when the dependency
      # changes. Without this, every CI run pays ~4 min downloading Chromium
      # from playwright.azureedge.net, and a slow/stalled CDN looks like a
      # "stuck" workflow.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        timeout-minutes: 5
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            # Browser binary is cached; still need the apt system libs.
            npx playwright install-deps chromium
          else
            npm run test:e2e:install
          fi

      - name: Run Playwright E2E tests
        timeout-minutes: 10
        run: npm run test:e2e

      - name: Prune dev dependencies before deploy
        run: npm prune --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cozycasa'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2214993838554F44934AE77B7DF3FC5D }}
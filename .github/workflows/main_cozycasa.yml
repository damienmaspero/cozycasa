# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy to Azure Web App - cozycasa

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys to the same App Service slot. azure/webapps-deploy uses
# Kudu OneDeploy, which returns `Conflict (CODE: 409)` if another deployment
# is already in progress on the target slot. Queue runs instead of cancelling
# so an in-flight OneDeploy is allowed to finish cleanly.
concurrency:
  group: deploy-cozycasa-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Prune dev dependencies before deploy
        run: npm prune --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v4
        with:
          app-name: 'cozycasa'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2214993838554F44934AE77B7DF3FC5D }}

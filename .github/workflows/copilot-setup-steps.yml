name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install Expo Skills
        # Installs the official Expo AI agent skills from https://github.com/expo/skills
        # so they are available to future Copilot sessions working on this repo.
        #
        # `skills add` is interactive by default and prompts the user to pick which
        # skills to install. In CI there is no TTY, so without --yes the prompt
        # receives no input and the CLI exits without installing anything (while
        # still returning exit code 0, which makes the step look successful).
        # Pass --yes to accept defaults and install all skills non-interactively.
        run: bunx --bun skills add expo/skills --yes

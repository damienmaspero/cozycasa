# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy - cozycasa (test)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

# Cancel superseded runs for the same PR so rapid pushes don't queue up. The
# test slot uses Azure OneDeploy which returns 409 on concurrent deploys, so
# keep one run per PR ref at a time.
concurrency:
  group: deploy-cozycasa-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Prune dev dependencies before deploy
        run: npm prune --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cozycasa'
          slot-name: 'test'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A0CD9D90AA0841A88B05DB87B7DB5F79 }}

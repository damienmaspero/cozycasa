# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - cozycasa (test)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Assemble standalone deployment artifact
        run: |
          # See main_cozycasa.yml: deploy the self-contained `.next/standalone`
          # output (run with `node server.js`) instead of `next start`, which
          # Azure App Service cannot resolve. Copy in the static/public assets
          # that the standalone output omits, then point the deployed `start`
          # script at the standalone server (Azure runs `npm start`, and the
          # `startup-command` action input is rejected with publish-profile
          # auth). `HOSTNAME=0.0.0.0` is required: the standalone `server.js`
          # binds to `process.env.HOSTNAME || '0.0.0.0'`, and Azure sets
          # HOSTNAME to the container instance name, so without the override the
          # server crashes with `getaddrinfo ENOTFOUND <instance>` and never
          # answers the health probe. Only the standalone copy is modified.
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          node -e "const fs=require('fs');const p='.next/standalone/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.scripts={...j.scripts,start:'HOSTNAME=0.0.0.0 node server.js'};fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cozycasa'
          slot-name: 'test'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A0CD9D90AA0841A88B05DB87B7DB5F79 }}